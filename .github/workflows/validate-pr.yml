name: Validate Tool PR

on:
  pull_request:
    paths:
      - 'tools/**/*.yaml'

jobs:
  validate:
    name: Validate tool YAML files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed tool files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'tools/**/*.yaml' | tr '\n' '\n')
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$CHANGED"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Validate changed tool files
        working-directory: scripts
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: npx tsx validate-tool.ts

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Tool validation failed.** Please check the workflow logs and fix the errors in your YAML file.\n\nCommon issues:\n- Missing `problem_solved` field (required, min 50 chars)\n- Fewer than 3 `use_cases`\n- Missing both `github_url` and `website_url`\n- Invalid `category` value'
            })
