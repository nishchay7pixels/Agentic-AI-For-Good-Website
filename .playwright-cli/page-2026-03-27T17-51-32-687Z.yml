            - paragraph [ref=e35]: Our mission is to surface the real work. We curate verified use cases, break down architectures, and highlight impact metrics. We believe that by showcasing what is actually working, we can help the entire field move faster—builders learning from builders, founders inspired by proof, researchers guided by evidence.
