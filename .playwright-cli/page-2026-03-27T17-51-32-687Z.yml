            - paragraph [ref=e28]: "We started with a simple observation: for every real agentic AI deployment, there were a hundred demos. The signal was drowning in noise. Builders were shipping incredible work—systems that saved lives, cut costs, and transformed industries—but no one was documenting it. We decided to change that."
