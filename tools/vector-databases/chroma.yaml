name: Chroma
description: Chroma is the open-source data infrastructure for AI. It gives you everything you need for retrieval — store embeddings with metadata, search with dense and sparse vectors, filter by metadata, and retrieve across text, images, and more. Built on object storage, it runs locally, self-hosted, or as a managed serverless cloud service trusted by millions of developers.
tagline: Open-source search infrastructure for AI

website_url: https://www.trychroma.com
github_url: https://github.com/chroma-core/chroma
docs_url: https://docs.trychroma.com

install_command: pip install chromadb

category: Vector DB
tags: [vector-database, embeddings, semantic-search, rag, full-text-search, metadata-search, open-source]
pricing: freemium
is_open_source: true
license: Apache-2.0

problem_solved: |
  Developers building AI applications need a fast, scalable way to store and search billions of embeddings
  and unstructured data. Legacy search systems require manual tuning, expensive memory, and complex ops,
  while Chroma provides zero-ops, serverless vector, full-text, and metadata search built on cheap object
  storage — making it up to 10x cheaper with no engineering overhead.

use_cases:
  - Build RAG systems and context-aware chatbots that retrieve relevant documents before sending them to an LLM
  - Run semantic and lexical document search across large knowledge bases with metadata filtering
  - Perform multi-modal retrieval across text, images, and other unstructured data types
