name: Composio
description: Composio powers 1000+ toolkits, tool search, context management, authentication, and a sandboxed workbench to help you build AI agents that turn intent into action. It provides just-in-time tool calls, secure delegated OAuth, and parallel execution across apps like GitHub, Gmail, Slack, and Notion.
tagline: Your agent decides what to do. We handle the rest.

github_url: https://github.com/ComposioHQ/composio
website_url: https://composio.dev
docs_url: https://docs.composio.dev

category: Dev Tools
tags: [ai-agents, tool-integration, mcp, oauth, sandbox, sdk, python, typescript, developer-tools, automation]
pricing: freemium
is_open_source: true
license: MIT

problem_solved: |
  Developers building AI agents waste weeks writing custom integrations, handling OAuth flows,
  and maintaining tool schemas for every external app. Composio eliminates this by providing
  pre-built, authenticated toolkits with managed auth, sandboxed execution, and intent-based
  tool discovery so agents can interact with 1000+ apps out of the box.

use_cases:
  - Automate inbox triage by summarizing unread emails and creating tasks in project management tools
  - Sync CRM pipelines and bulk import contacts without manual data entry across platforms
  - Trigger CI/CD deployments and monitor infrastructure health from chat interfaces
